<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIkit Tabbed Interface</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.21.7/css/uikit.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.21.7/js/uikit.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.21.7/js/uikit-icons.min.js"></script>
  <style>
    #spinner {
      display: none;
    }

    .uk-container {
      padding-bottom: 70px;
      /* Add padding to avoid content being hidden behind the tabs */
    }

    .table-row-title {
      font-weight: 500;
    }

    .table-row-subtitle {
      font-size: smaller;
    }

    .detail-container {
      position: fixed;
      top: 0;
      left: 100%;
      width: 100%;
      height: 100%;
      background-color: white;
      /* Ensure visibility */
      z-index: 1000;
      /* Make sure it is above other elements */
      overflow-y: auto;
      /* Allow scrolling if content is too tall */
      transition: left 0.5s ease;
    }

    .detail-container.show {
      left: 0;
    }

    #detail-back-button {
      border: none;
      background-color: transparent;
      padding: 20px;
    }

    .detail-table-separator {
      border-bottom: 1px solid black;
    }

  </style>
</head>

<body>

  <div id="login-modal" uk-modal>
    <div class="uk-modal-dialog uk-modal-body">
      <h2 class="uk-modal-title">Login</h2>
      <form id="login-form">
        <div class="uk-margin">
          <input class="uk-input" type="email" id="email" placeholder="Email" required="" autocomplete="email">
        </div>
        <div class="uk-margin">
          <input class="uk-input" type="password" id="password" placeholder="Password" required>
        </div>
        <div class="uk-margin">
          <button class="uk-button uk-button-primary" type="submit">Login</button>
        </div>
      </form>
    </div>
  </div>

  <div id="spinner" class="uk-flex uk-flex-center uk-flex-middle" uk-height-viewport uk-spinner>
  </div>

  <header class="uk-sticky uk-navbar-container" uk-sticky>
    <div style="padding-bottom: 0px;" class="uk-container">
      <h2 class="uk-margin-top"><span>Montebook 2013</span></h2>

      <ul uk-tab="connect: #tab-content">
        <li><a href="#">Families</a></li>
        <li><a href="#">Staff</a></li>
        <li><a href="#">Rooms</a></li>
        <li><a href="#"><span uk-icon="icon: cog"></span></a></li>
      </ul>

      <input id="search-input" class="uk-input uk-margin-bottom" type="text" placeholder="Search...">
    </div>
  </header>

  <div id="detail-container" class="detail-container">

    <nav class="uk-navbar-container" uk-navbar>
      <div class="uk-navbar-left">
        <ul class="uk-navbar-nav">
          <li class="uk-active">
            <button id="detail-back-button" class="uk-button uk-button-text">
              <span uk-icon="chevron-left"></span> Families
          </button>
          </li>
        </ul>
      </div>
    </nav>

    <table class="uk-table uk-table-divider">
      <tbody id="detail-table-body"></tbody>
    </table>
  </div>


  <div class="uk-container">
    <ul id="tab-content" class="uk-switcher uk-margin">
      <!-- Families Tab -->
      <li>
        <table class="uk-table uk-table-divider">
          <thead>
            <tr>
            </tr>
          </thead>
          <tbody id="family-table-body"></tbody>
        </table>
      </li>

      <!-- Staff Tab -->
      <li>
        <table class="uk-table uk-table-divider">
          <thead>
            <tr>
              <th>Name</th>
              <th>Position</th>
            </tr>
          </thead>
          <tbody id="staff-table-body">
            <tr>
              <td>Alice Johnson</td>
              <td>Teacher</td>
            </tr>
            <tr>
              <td>Bob Lee</td>
              <td>Administrator</td>
            </tr>
            <tr>
              <td>Carol White</td>
              <td>Janitor</td>
            </tr>
          </tbody>
        </table>
      </li>

      <!-- Rooms Tab -->
      <li>
        <table class="uk-table uk-table-divider">
          <thead>
            <tr>
              <th>Room Number</th>
              <th>Capacity</th>
            </tr>
          </thead>
          <tbody id="rooms-table-body">
            <tr>
              <td>101</td>
              <td>30</td>
            </tr>
            <tr>
              <td>102</td>
              <td>25</td>
            </tr>
            <tr>
              <td>103</td>
              <td>20</td>
            </tr>
          </tbody>
        </table>
      </li>

      <!-- Settings Tab -->
      <li>
        <table class="uk-table uk-table-divider">
          <thead>
            <tr>
              <th>Setting</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="settings-table-body">
            <tr>
              <td>Theme</td>
              <td>Light</td>
            </tr>
            <tr>
              <td>Notifications</td>
              <td>Enabled</td>
            </tr>
            <tr>
              <td>Language</td>
              <td>English</td>
            </tr>
          </tbody>
        </table>
      </li>
    </ul>
  </div>

  <script type="module" src="./index.mjs" defer></script>

</body>

</html>
